    - id: e.sys_uses_ts
      source: system.atlas
      target: tech.typescript_strict
      type: depends_on
    - id: e.api_uses_port_env
      source: container.api
      target: env.api_port
      type: depends_on
    - id: e.api_uses_workspace_env
      source: container.api
      target: env.workspace
      type: depends_on
    - id: e.web_uses_port_env
      source: container.web
      target: env.web_port
      type: depends_on
  flows:
    - id: flow.greenfield_design
      name: Greenfield design → AI implementation
      description: Architect models the intended system, creates a proposal between architecture versions, then hands an AI agent a migration brief.
      owner: architecture
      criticality: high
      steps:
        - id: s1
          label: Start from blank or generic starter atlas
        - id: s2
          label: Add systems, containers, components, datastores, contracts, risks, decisions
          nodeId: module.atlas_core
        - id: s3
          label: Create a proposal capturing the next architecture change
          nodeId: decision.proposals_first_class
        - id: s4
          label: Generate migration brief via /api/migration-brief
          nodeId: api.rest
        - id: s5
          label: AI agent implements the diff and updates architecture files together
          nodeId: stakeholder.ai_agent
        - id: s6
          label: Architect reviews, validates, resolves conflicts
      failureModes:
        - AI silently weakens an invariant
        - Proposal acceptance checks are too vague to verify
      acceptanceChecks:
        - Validation passes after import
        - All flows still have linked tests
      linkedTests: []
      notes: ""
    - id: flow.brownfield_import
      name: Brownfield import → first atlas
      description: Scan an existing repository, promote useful discovered facts into authored nodes, then commit the architecture pack.
      owner: architecture
      criticality: high
      steps:
        - id: s1
          label: Point System Atlas at the consumer project (SYSTEM_ATLAS_WORKSPACE)
          nodeId: container.api
        - id: s2
          label: Click Scan → /api/scan indexes structure, files, classes, routes, schemas
          nodeId: module.atlas_files
        - id: s3
          label: Review Import Review and promote relevant evidence into authored nodes
          nodeId: module.import_review
        - id: s4
          label: Manually model datastores, contracts, flows, risks, decisions
          nodeId: module.inspector
        - id: s5
          label: Export the pack so the AI agent reads it on the next session
          nodeId: module.atlas_files
      failureModes:
        - Scanner mis-classifies a file and adds noise to the atlas
        - Architect over-promotes inferred facts without confirming them
      acceptanceChecks:
        - "Inferred nodes carry confidence: inferred until reviewed"
        - Pack Health reports healthy after Export
      linkedTests:
        - server/atlasFiles.test.ts
      notes: ""
    - id: flow.autosync
      name: UI edit → autosync export
      description: Edits in the canvas debounce-export the pack and update Pack Health.
      owner: architecture
      criticality: high
      steps:
        - id: s1
          label: Architect edits a node in the Inspector
          nodeId: module.inspector
        - id: s2
          label: App debounces, calls /api/export with the current baseRevision
          nodeId: api.rest
        - id: s3
          label: exportAtlas writes the changed concept files and regenerates derived files
          nodeId: module.atlas_files
        - id: s4
          label: Pack Health turns healthy; status footer shows synced timestamp
      failureModes:
        - External edit happens between debounce and Export → 409 conflict
        - Disk write fails mid-export and pack becomes misaligned
      acceptanceChecks:
        - 409 surfaces to the user as 'External changes — reload or force'
        - Pack Health flags misalignment within one revision check
      linkedTests: []
      notes: ""
    - id: flow.external_edit_reconcile
      name: External edit reconciliation
      description: When architecture files change on disk while the UI has unsaved edits, prompt the architect to reload or force-export.
      owner: architecture
      criticality: high
      steps:
        - id: s1
          label: API polls architectureRevision()
          nodeId: module.atlas_files
        - id: s2
          label: Web detects the on-disk revision diverged from the loaded one
        - id: s3
          label: User picks Reload (discard UI edits) or Export with force=true
      failureModes:
        - User force-exports and loses upstream edits
      acceptanceChecks:
        - Force path requires explicit confirmation
      linkedTests: []
      notes: ""
